services:
# Make sure you have updated/checked the .env file with the correct variables.
# All the ${ xx } need to be defined there.
  # Tailscale Sidecar Configuration
  tailscale-minecraft:
    image: tailscale/tailscale:latest # Image to be used
    container_name: tailscale-minecraft # Name for local container management
    hostname: minecraft # Name used within your Tailscale environment
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      # No TS_SERVE_CONFIG — Minecraft uses raw TCP, not HTTP
      - TS_ENABLE_HEALTH_CHECK=true # Enable healthcheck endpoint: "/healthz"
      - TS_LOCAL_ADDR_PORT=127.0.0.1:41234 # The <addr>:<port> for the healthz endpoint
      #- TS_ACCEPT_DNS=true # Uncomment when using MagicDNS
      - TS_AUTH_ONCE=true
    volumes:
      - ./config:/config # Config folder used to store Tailscale files - you may need to change the path
      - ts-minecraft-data:/var/lib/tailscale # Tailscale state data
    devices:
      - /dev/net/tun:/dev/net/tun # Network configuration for Tailscale to work
    cap_add:
      - net_admin # Tailscale requirement
    # If any DNS issues arise, use your preferred DNS provider by uncommenting the config below
    #dns:
    #  - 1.1.1.1
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:41234/healthz"] # Check Tailscale has a Tailnet IP and is operational
      interval: 1m # How often to perform the check
      timeout: 10s # Time to wait for the check to succeed
      retries: 3 # Number of retries before marking as unhealthy
      start_period: 10s # Time to wait before starting health checks
    restart: unless-stopped

  # Minecraft Server
  minecraft:
    image: itzg/minecraft-server:latest # Community standard Minecraft server image
    container_name: minecraft # Name for local container management
    network_mode: service:tailscale-minecraft # Sidecar configuration to route Minecraft through Tailscale
    environment:
      - EULA=TRUE # Required — accepted by the user
      - TYPE=${SERVER_TYPE} # VANILLA, PAPER, FABRIC, FORGE, etc.
      - VERSION=${MINECRAFT_VERSION} # e.g. LATEST or 1.21.4
      - DIFFICULTY=${DIFFICULTY}
      - MAX_PLAYERS=${MAX_PLAYERS}
      - MOTD=${MOTD}
      - MEMORY=${MEMORY}
      - ONLINE_MODE=${ONLINE_MODE} # Set false for cracked/offline servers
    volumes:
      - minecraft-data:/data # Persistent world and server data
    # Uncomment to also bind to the local network (outside Tailnet):
    #ports:
    #  - "0.0.0.0:25565:25565"
    depends_on:
      tailscale-minecraft:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ts-minecraft-data:
  minecraft-data:
